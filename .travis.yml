language: perl
matrix:
  include:
    - perl: "5.8"

sudo: true

install:
  - cpanm --quiet --notest IPC::Run Net::OpenSSH BSD::Resource

script:
  - git clone git://github.com/eserte/Doit.git
  - cp -v Doit-File.pm Doit/lib/Doit/File.pm
  - perl -IDoit/lib -IDoit/t t/file-debug.t

branches:
  except:
    - /appveyor/
