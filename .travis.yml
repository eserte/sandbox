# don't specify: language: perl
os:
  - osx
sudo: true

branches:
  except:
    - /appveyor/

before_install:
# Required system dependencies
# * cpanminus           for installing CPAN modules
  - brew install cpanminus
# Special deps
  - brew install glib pango

install:
# re ARCHFLAGS see https://github.com/Homebrew/homebrew-core/issues/5404
  - ARCHFLAGS="-arch x86_64" cpanm --sudo --quiet --notest Glib
  - cpanm --sudo --verbose Pango

script:
  - true
