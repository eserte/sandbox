# don't specify: language: perl
os:
  - osx
env: BBBIKE_TEST_SKIP_MODPERL=1 BBBIKE_TEST_GUI=1
sudo: true

branches:
  except:
    - /appveyor/

before_install:
  - brew update; brew install cpanminus
  - git clone --depth=1 https://github.com/eserte/bbbike.git
  - cd bbbike

install:
  - cpanm --sudo --quiet --installdeps --notest .

script:
  - cd t && make test-no-cgi
